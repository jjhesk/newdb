<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="title" content="newdb" />
    <meta
      name="description"
      content="Generate PostgreSQL role, database, and extension setup SQL from your browser."
    />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="newdb: PostgreSQL setup" />
    <meta name="application-name" content="newdb: PostgreSQL setup" />
    <meta name="format-detection" content="telephone=no" />

    <meta name="theme-color" content="#1B9BDB" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#16171d" />

    <link rel="manifest" href="/manifest.webmanifest" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="196x196" href="/icons/favicon-196.png" />
    <link rel="apple-touch-icon" href="/icons/apple-icon-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PostgreSQL setup</title>
    <script>
      (function () {
        try {
          var k = 'newdb:theme'
          var s = localStorage.getItem(k)
          if (s === 'light' || s === 'dark') {
            document.documentElement.setAttribute('data-theme', s)
            return
          }
          var dark = window.matchMedia('(prefers-color-scheme: dark)').matches
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light')
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
